site:
  name: OpenAI4S
  site: 'https://openai4s.org'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: false

# Default SEO metadata
metadata:
  title:
    default: OpenAI4S — Open AI for Scientist
    template: '%s — OpenAI4S'
  description: 'OpenAI4S is an open-source, pure-stdlib Code-as-Action scientific research agent. It emits real Python/R into a persistent Jupyter-style kernel — not tool_use JSON. Multi-provider LLM behind one host.llm, 24 science Skills, BYOC GPU compute. Runs on Doubao via Volcengine Ark for ¥9.9/month. MIT.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: OpenAI4S
    images:
      - url: '~/assets/images/og.png'
        width: 1200
        height: 630
    type: website
  twitter:
    handle: '@openai4s'
    site: '@openai4s'
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: false
    postsPerPage: 6

    post:
      isEnabled: false
      permalink: '/%slug%'
      robots:
        index: false

    list:
      isEnabled: false
      pathname: 'blog'
      robots:
        index: false

    category:
      isEnabled: false
      pathname: 'category'
      robots:
        index: false

    tag:
      isEnabled: false
      pathname: 'tag'
      robots:
        index: false

    isRelatedPostsEnabled: false
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null

ui:
  theme: 'dark' # dark-first; toggle still available, light mode fully supported
